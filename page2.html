<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Secret Santa</title>
  </head>
  <body>
    <div id="snow"></div>
    <div id="sky"></div>
    <div id="leves"></div>
    <div id="trunk"></div>
    <div id="leves2"></div>
    <div id="trunk2"></div>
    <div id="dear">
      <img src="dear.png" alt="" />
    </div>
    <div id="santa">
      <img src="santa.png" alt="" />
    </div>
    <div id="giftIMG">
      <img width="200" height="200" src="gift.png" alt="" />
    </div>
    <h1>Secret Santa</h1>
    <div class="gift">
      <h1 style="color: aqua">a qui je dois donner un cadeau?</h1>
      <label id="gift" for="">votre nom</label>

      <input id="recINP" type="text" />
      <button id="recBTN">Afficher</button>
    </div>
  </body>
  <script>
    const recINP = document.getElementById("recINP");
    const recBTN = document.getElementById("recBTN");
    const santaList = JSON.parse(sessionStorage.getItem("santaList"));
    const gift = document.getElementById("gift");
    const showREC = () => {
      const recName = document.createElement("h2");
      const xd = recINP.value;
      console.log(santaList);
      console.log(xd);
      if (santaList[xd] !== undefined) {
        alert(santaList[xd]);

        recName.innerText = santaList[xd];
        gift.appendChild(recName);
      } else {
        alert(`ce nom '${xd}' ne trouve pas. inserer un autre nom`);
        recName.innerText = `ce nom '${xd}' ne trouve pas. inserer un autre nom`;
      }
    };
    recBTN.addEventListener("click", showREC);
  </script>
</html>
